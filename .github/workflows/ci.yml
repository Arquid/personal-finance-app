name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finance_user
          POSTGRES_PASSWORD: finance_pass
          POSTGRES_DB: finance_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Create .env.test
        run: |
          echo "DATABASE_URL=postgresql://finance_user:finance_pass@localhost:5432/finance_test_db" >> .env.test
          echo "PORT=4000" >> .env.test

      - run: npm test
